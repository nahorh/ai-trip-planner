<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌍 AI Travel Planner</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #60a5fa;
      --bg: #05060a;
      --panel: rgba(15, 17, 26, 0.95);
      --panel-muted: rgba(12, 13, 20, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --text-muted: #9da3b4;
      --user-bubble: linear-gradient(135deg, #2563eb, #1d4ed8);
      --assistant-bubble: rgba(20, 24, 35, 0.95);
      --sidebar: rgba(8, 10, 18, 0.95);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --accent: #fbbf24;
    }

    :root.light-theme {
      color-scheme: light;
      --primary: #2563eb;
      --primary-dark: #1e3a8a;
      --primary-light: #93c5fd;
      --bg: #f3f5fb;
      --panel: #ffffff;
      --panel-muted: #fbfbfe;
      --border: rgba(15, 23, 42, 0.08);
      --text: #0f172a;
      --text-muted: #5b6478;
      --user-bubble: linear-gradient(135deg, #2563eb, #1d4ed8);
      --assistant-bubble: #edf0f8;
      --sidebar: #f7f8fc;
      --shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      --accent: #d97706;
    }

    :root.dark-theme {
      color-scheme: dark;
      --primary: #60a5fa;
      --primary-dark: #1e3a8a;
      --primary-light: #93c5fd;
      --bg: radial-gradient(circle at top, rgba(45, 64, 160, 0.45), rgba(5, 6, 10, 0.95));
      --panel: rgba(18, 22, 35, 0.95);
      --panel-muted: rgba(12, 13, 18, 0.9);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e5ecff;
      --text-muted: #a8b3cf;
      --user-bubble: linear-gradient(135deg, #4776e6, #8e54e9);
      --assistant-bubble: rgba(26, 31, 50, 0.9);
      --sidebar: rgba(8, 10, 16, 0.95);
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
      --accent: #facc15;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      background: var(--bg);
      color: var(--text);
      padding: clamp(0.5rem, 2vw, 1rem);
    }

    .app-frame {
      width: min(1300px, 100%);
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1.25rem;
      background: transparent;
    }

    @media (max-width: 900px) {
      .app-frame {
        grid-template-columns: 1fr;
      }
    }

    .sidebar {
      background: var(--sidebar);
      border-radius: 22px;
      padding: 1.5rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      min-height: calc(100vh - clamp(1rem, 2vw, 2rem));
    }

    .sidebar h1 {
      font-size: 1.5rem;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sidebar .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin: 0;
    }

    .history {
      flex: 1;
      overflow-y: auto;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .history button {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      padding: 0.8rem 0.9rem;
      border-radius: 12px;
      text-align: left;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .history button:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    h1 {
      margin-top: 0;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      letter-spacing: -0.03em;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    @media (min-width: 768px) {
      header {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .chat-panel {
      background: var(--panel);
      border-radius: 26px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - clamp(1rem, 2vw, 2rem));
      overflow: hidden;
    }

    .chat-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.01);
    }

    .chat-header h2 {
      margin: 0;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .theme-toggle {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .theme-toggle button {
      border: none;
      padding: 0.4rem 0.9rem;
      background: transparent;
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .theme-toggle button.active {
      background: var(--primary);
      color: #fff;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      background: var(--panel-muted);
    }

    .message {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.9rem;
      align-items: flex-start;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--accent);
    }

    .bubble {
      padding: 1rem 1.25rem;
      border-radius: 18px;
      line-height: 1.65;
      position: relative;
      background: var(--assistant-bubble);
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .message.user {
      grid-template-columns: 1fr auto;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 6px;
      border: none;
    }

    .message.assistant .bubble {
      border-bottom-left-radius: 6px;
    }

    .bubble h2,
    .bubble h3,
    .bubble h4 {
      margin-top: 0.2rem;
      margin-bottom: 0.5rem;
    }

    .bubble ul,
    .bubble ol {
      padding-left: 1.5rem;
    }

    .bubble code {
      background: rgba(255, 255, 255, 0.08);
      padding: 0.25rem 0.4rem;
      border-radius: 6px;
      font-size: 0.92rem;
    }

    .bubble pre {
      background: rgba(15, 23, 42, 0.35);
      padding: 0.85rem;
      border-radius: 12px;
      overflow-x: auto;
    }

    .composer-wrapper {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.9rem;
      align-items: center;
      background: var(--panel-muted);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.4rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    input[type="text"] {
      width: 100%;
      padding: 0.9rem 1.1rem;
      border-radius: 16px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      border: none;
      border-radius: 16px;
      padding: 0.85rem 1.4rem;
      background: linear-gradient(120deg, var(--primary), var(--primary-dark));
      color: #f8fafc;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 15px 35px rgba(37, 99, 235, 0.35);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem 1.5rem;
      font-size: 1rem;
    }

    .spinner {
      display: none;
      margin-left: 0.5rem;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    button.loading .spinner {
      display: inline-flex;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .footnote {
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .theme-controls {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .theme-toggle {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .theme-toggle button {
      margin: 0;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      border-right: 1px solid var(--border);
      padding: 0.85rem 0.5rem;
      font-size: 0.95rem;
      transition: background 0.2s, color 0.2s;
    }

    .theme-toggle button:last-child {
      border-right: none;
    }

    .theme-toggle button.active {
      background: linear-gradient(120deg, var(--primary), var(--primary-dark));
      color: #fff;
    }
  </style>
</head>

<body>
  <div class="app-frame">
    <aside class="sidebar">
      <div>
        <h1>🌍 Travel Planner</h1>
        <p class="subtitle">Your agent crafts rich itineraries powered by live data.</p>
      </div>
      <div class="history">
        <button type="button">European backpacking ideas</button>
        <button type="button">Budget-friendly Bali getaway</button>
        <button type="button">Workcation in Lisbon</button>
        <button type="button">Cycling trip through Vietnam</button>
      </div>
      <div class="footnote">
        *Always verify prices, availability, and travel requirements before booking.
      </div>
    </aside>

    <section class="chat-panel">
      <header class="chat-header">
        <h2>Conversation</h2>
        <div class="theme-toggle" role="group" aria-label="Theme selector">
          <button type="button" data-theme="system" class="active">System</button>
          <button type="button" data-theme="light">Light</button>
          <button type="button" data-theme="dark">Dark</button>
        </div>
      </header>

      <div id="messages" class="messages">
        <div class="empty-state">Your travel conversation will start here. ✈️</div>
      </div>

      <div class="composer-wrapper">
        <form id="trip-form" class="composer">
          <label for="prompt" class="sr-only">Tell us about your next trip</label>
          <input id="prompt" type="text" placeholder="Describe your next dream trip..." autocomplete="off" required />
          <button type="submit">
            Send plan
            <span class="spinner"></span>
          </button>
        </form>
      </div>
    </section>
  </div>

  <script type="module">
    import DOMPurify from "https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.es.mjs";
    import { marked } from "https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.esm.js";

    const form = document.getElementById("trip-form");
    const promptInput = document.getElementById("prompt");
    const messages = document.getElementById("messages");
    const button = form.querySelector("button");
    const themeButtons = document.querySelectorAll(".theme-toggle button");
    const root = document.documentElement;
    const STORAGE_KEY = "travel-planner-theme";

    const applyTheme = (mode) => {
      root.classList.remove("light-theme", "dark-theme");
      if (mode === "light") root.classList.add("light-theme");
      if (mode === "dark") root.classList.add("dark-theme");
      if (mode === "system") {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        root.classList.add(prefersDark ? "dark-theme" : "light-theme");
      }
    };

    const setActiveButton = (mode) => {
      themeButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.theme === mode);
      });
    };

    const savedTheme = localStorage.getItem(STORAGE_KEY) || "system";
    applyTheme(savedTheme);
    setActiveButton(savedTheme);

    themeButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const selected = btn.dataset.theme;
        localStorage.setItem(STORAGE_KEY, selected);
        applyTheme(selected);
        setActiveButton(selected);
      });
    });

    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      const mode = localStorage.getItem(STORAGE_KEY) || "system";
      if (mode === "system") applyTheme("system");
    });

    marked.setOptions({
      breaks: true,
      gfm: true
    });

    const scrollMessages = () => {
      messages.scrollTop = messages.scrollHeight;
    };

    const createBubble = (role, content) => {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "assistant" ? "AI" : "You";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = content;

      if (role === "user") {
        wrapper.appendChild(bubble);
        wrapper.appendChild(avatar);
      } else {
        wrapper.appendChild(avatar);
        wrapper.appendChild(bubble);
      }

      return wrapper;
    };

    const renderMarkdown = (text) => DOMPurify.sanitize(marked.parse(text));

    const addMessage = (role, message) => {
      if (messages.querySelector(".empty-state")) {
        messages.innerHTML = "";
      }
      const html = role === "assistant" ? renderMarkdown(message) : DOMPurify.sanitize(message);
      const bubbleWrapper = createBubble(role, html);
      messages.appendChild(bubbleWrapper);
      scrollMessages();
      return bubbleWrapper.querySelector(".bubble");
    };

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const question = promptInput.value.trim();
      if (!question) return;

      addMessage("user", question);
      promptInput.value = "";
      button.disabled = true;
      button.classList.add("loading");
      const placeholder = addMessage("assistant", "Crafting your travel plan...");

      try {
        const response = await fetch("/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        if (!response.ok) {
          const error = await response.text();
          throw new Error(error || "Unexpected error");
        }

        const data = await response.json();
        const markdown = data.answer || "No answer returned.";
        placeholder.innerHTML = renderMarkdown(markdown);
      } catch (error) {
        placeholder.textContent = `Something went wrong: ${error.message}`;
      } finally {
        button.disabled = false;
        button.classList.remove("loading");
        scrollMessages();
      }
    });
  </script>
</body>

</html>
